// ── Yahoo Finance live fetch ─────────────────────────────────────────
// Uses browser's existing YF cookies (credentials:'include').
// Flow: getcrumb → quoteSummary ×7 → derive FCF Yield / Net Debt/EBITDA
// Falls back to static VALUATION_BASE if request fails or user has no YF session.
async function fetchYFValuation() {
  const crumbRes = await fetch(
    'https://query2.finance.yahoo.com/v1/test/getcrumb',
    { credentials:'include' }
  );
  if (!crumbRes.ok) throw new Error('crumb failed');
  const crumb = await crumbRes.text();
  if (!crumb || crumb.length < 2 || crumb.includes('{')) throw new Error('bad crumb');

  const tickers = ['XOM','CVX','COP','EOG','OXY','DVN','FANG'];
  const modules = 'defaultKeyStatistics,summaryDetail,financialData';
  const out = {};

  for (const t of tickers) {
    const url = `https://query1.finance.yahoo.com/v10/finance/quoteSummary/${t}?modules=${modules}&crumb=${encodeURIComponent(crumb)}`;
    const res  = await fetch(url, { credentials:'include' });
    const data = await res.json();
    const r    = data?.quoteSummary?.result?.[0];
    if (!r) continue;

    const ks = r.defaultKeyStatistics || {};
    const sd = r.summaryDetail        || {};
    const fd = r.financialData        || {};
    const g  = (obj, k) => obj[k]?.raw ?? null;

    const mc   = g(sd,'marketCap');
    const fcf  = g(fd,'freeCashflow');
    const td   = g(fd,'totalDebt');
    const tc   = g(fd,'totalCash');
    const eb   = g(fd,'ebitda');
    const dy   = g(sd,'trailingAnnualDividendYield');
    const eveb = g(ks,'enterpriseToEbitda');
    const beta = g(ks,'beta');
    const fpe  = g(ks,'forwardPE');
    const roe  = g(fd,'returnOnEquity');
    const price= g(sd,'regularMarketPrice') || g(sd,'previousClose');

    const fcfYield     = (fcf && mc)          ? +(fcf/mc*100).toFixed(2)  : null;
    const nd           = (td && tc)           ? td - tc                    : null;
    const netDebtEbitda= (nd !== null && eb)  ? +(nd/eb).toFixed(2)       : null;

    out[t] = {
      price,
      marketCap_B:   mc   ? +(mc/1e9).toFixed(1)  : null,
      evEbitda:      eveb ? +eveb.toFixed(2)       : null,
      pe:            fpe  ? +fpe.toFixed(1)        : null,
      fcfYield,
      divYield:      dy   ? +(dy*100).toFixed(2)   : null,
      netDebtEbitda,
      beta:          beta ? +beta.toFixed(2)        : null,
      roic:          roe  ? +(roe*100).toFixed(1)  : null,
    };
    await new Promise(res => setTimeout(res, 150));
  }
  return out;
}

function Sparkline({ series, color }) {
  const min=Math.min(...series), max=Math.max(...series), range=max-min||1;
  const W=72, H=28, P=2;
  const pts=series.map((v,i)=>`${P+(i/(series.length-1))*(W-P*2)},${H-P-((v-min)/range)*(H-P*2)}`).join(" ");
  const last=pts.split(" ").pop().split(",");
  const up=series[series.length-1]>=series[series.length-2];
  return (
    <svg width={W} height={H}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth={1.5} opacity={0.65}/>
      <circle cx={last[0]} cy={last[1]} r={2.5} fill={up?"#50E3A4":"#FF6B6B"}/>
    </svg>
  );
}

function heatColor(val, allVals, invert=false) {
  const mn=Math.min(...allVals), mx=Math.max(...allVals), rng=mx-mn||1;
  let n=(val-mn)/rng;
  if(invert) n=1-n;
  if(n>0.66) return `rgba(80,227,164,${0.25+n*0.5})`;
  if(n>0.33) return `rgba(251,146,60,0.45)`;
  return `rgba(255,107,107,${0.25+(1-n)*0.4})`;
}

// ── YAHOO FINANCE LIVE FETCH ──────────────────────────────────────────
// Uses allorigins.win as CORS proxy → scrapes YF key-statistics HTML
// Regex: field name + .{1,20} + raw + .{1,10} + : + number (handles \" escaping)
const PROXY = "https://api.allorigins.win/raw?url=";
const YF_PAGE = t => `https://finance.yahoo.com/quote/${t}/key-statistics/`;

function parseYFHTML(html) {
  const num = field => {
    const esc = field.replace(/[.*+?^${}()|[\]\]/g, '\$&');
    const m = html.match(new RegExp(esc + '.{1,20}raw.{1,10}:([-\d.eE+]+)'));
    return m ? parseFloat(m[1]) : null;
  };
  const ev = num('enterpriseValue');
  const evX = num('enterpriseToEbitda');
  const fcf = num('freeCashflow');
  const td = num('totalDebt');
  const cash = num('totalCash');
  const mktcap = num('marketCap');
  const roe = num('returnOnEquity');
  const divRaw = num('dividendYield');
  const ebitda = ev && evX ? ev / evX : null;
  return {
    price:         num('currentPrice'),
    evEbitda:      evX   != null ? +evX.toFixed(2)               : null,
    evFcf:         ev && fcf    ? +(ev / fcf).toFixed(1)         : null,
    pe:            num('trailingPE') != null ? +num('trailingPE').toFixed(1) : null,
    fcfYield:      fcf && mktcap   ? +(fcf / mktcap * 100).toFixed(1) : null,
    divYield:      divRaw != null  ? +(divRaw * 100).toFixed(2)  : null,
    netDebtEbitda: td != null && cash != null && ebitda ? +((td - cash) / ebitda).toFixed(2) : null,
    roic:          roe != null ? +(roe * 100).toFixed(1)          : null,
    beta:          num('beta') != null ? +num('beta').toFixed(3)  : null,
  };
}

async function fetchOneTicker(ticker) {
  const res = await fetch(PROXY + encodeURIComponent(YF_PAGE(ticker)));
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const html = await res.text();
  if (html.length < 5000) throw new Error('Too short – rate limited');
  return parseYFHTML(html);
}

async function fetchYFAll() {
  const out = {};
  for (const t of Object.keys(CO)) {
    try {
      out[t] = await fetchOneTicker(t);
    } catch(e) {
      console.warn(`YF ${t}:`, e.message);
      out[t] = null;
    }
    await new Promise(r => setTimeout(r, 1000)); // 1s between requests
  }
  return out;
}

            if (Object.keys(patch).length) next[t] = {...next[t], ...patch};
          }
        });
        return next;
      });
      setYfUpdated(new Date().toLocaleTimeString());
      setYfStatus("done");
    } catch(e) {
      console.warn('YF fetch error:', e.message);
      setYfStatus("error");
    }

  // auto-fetch on mount

  // ── AI handler ───────────────────────────────────────────────────
  const runAiUpdate = async () => {
    if (!aiText.trim()) return;
    setAiStatus("loading");
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:1000,
          system:AI_SYSTEM,
          messages:[{role:"user",content:aiText}]

      const json = await res.json();
      const raw = (json.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("") || "";

      const parsed = JSON.parse(clean);
      const {quarter, updates, valuation_updates, summary} = parsed;

      // extend or find quarter index
      let newQ = [...quarters];
      let qIdx = newQ.indexOf(quarter);
      let newData = {};

        newData[mk]={...data[mk]};

          newData[mk][t]=[...data[mk][t]];
        });

      if (qIdx===-1) {
        newQ=[...quarters, quarter];
        qIdx=newQ.length-1;
        Object.keys(newData).forEach(mk=>{
          Object.keys(CO).forEach(t=>{
            newData[mk][t]=[...newData[mk][t], data[mk][t][lastIdx]];
          });
        });
      }

      // patch operational data
      Object.entries(updates).forEach(([t,fields])=>{
        Object.entries(fields).forEach(([fk,fv])=>{
          if(fv!==null && newData[fk]){
            newData[fk][t][qIdx]=fv;
          }
        });
      });

      // patch valuation
      let newVal={...valuation};
      Object.entries(valuation_updates).forEach(([t,fields])=>{
        if(!newVal[t]) return;
        const patch={};
        Object.entries(fields).forEach(([k,v])=>{if(v!==null) patch[k]=v;});
        if(Object.keys(patch).length) newVal[t]={...newVal[t],...patch};
      });

      setQuarters(newQ);
      setData(newData);
      setValuation(newVal);
      setAiLog(prev=>[{
        time:new Date().toLocaleTimeString(),
        quarter,
        summary:summary||"数据已更新",
        tickers:Object.entries(updates).filter(([,f])=>Object.values(f).some(v=>v!==null)).map(([t])=>t)
      },...prev.slice(0,9)]);
      setAiStatus("done");
      setAiText("");
    } catch(e) {
      console.error(e);
      setAiStatus("error");
    }
  };

              </tbody>

          </div>
        </div>
      )}

      {view==="heatmap" && (
        <div style={{padding:"0 24px 24px"}}>
          <div style={{padding:"0 0 10px",display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>

              <thead>
                <tr>{["","类型","股价","EV/EBITDA","Fwd P/E","FCF Yield","股息","净债/EBITDA","ROE","Beta"].map(h=>(
                  <th key={h} style={{color:"#6e7681",padding:"5px 10px",textAlign:h===''||h==='类型'?"left":"right",borderBottom:"1px solid #21262d",fontWeight:400,whiteSpace:"nowrap",fontSize:10}}>{h}</th>
                ))}</tr>
              </thead>
              <tbody>
                {Object.keys(CO).filter(t=>active.includes(t)).map(t=>{
                  const v=valuation[t];
                  const fmt = (x, suffix='') => x!=null ? `${x}${suffix}` : '—';
                  return (
                    <tr key={t} style={{borderBottom:"1px solid #161b22"}}>
                      <td style={{color:CO[t].color,fontWeight:700,padding:"7px 10px"}}>{t}</td>
                      <td style={{color:"#6e7681",padding:"7px 10px",fontSize:10,whiteSpace:"nowrap"}}>{v.type}</td>
                      <td style={{textAlign:"right",padding:"7px 10px",color:"#e6edf3",fontWeight:700}}>
                        {livePrices[t] ? <span style={{color:"#50E3A4"}}>${(+livePrices[t]).toFixed(2)}</span> : (v.price ? `$${(+v.price).toFixed(2)}` : "—")}
                      </td>
                      <td style={{textAlign:"right",padding:"7px 10px",color:v.evEbitda>9?"#FF6B6B":v.evEbitda>6?"#FB923C":"#50E3A4",fontWeight:700}}>{fmt(v.evEbitda,'x')}</td>
                      <td style={{textAlign:"right",padding:"7px 10px",color:v.pe>20?"#FF6B6B":v.pe>14?"#FB923C":"#50E3A4"}}>{fmt(v.pe,'x')}</td>
                      <td style={{textAlign:"right",padding:"7px 10px",color:v.fcfYield>6?"#50E3A4":v.fcfYield>4?"#FB923C":"#FF6B6B",fontWeight:700}}>{fmt(v.fcfYield,'%')}</td>
                      <td style={{textAlign:"right",padding:"7px 10px",color:v.divYield>4?"#50E3A4":v.divYield>2.5?"#FB923C":"#6e7681"}}>{fmt(v.divYield,'%')}</td>
                      <td style={{textAlign:"right",padding:"7px 10px",color:v.netDebtEbitda>1.5?"#FF6B6B":v.netDebtEbitda>0.8?"#FB923C":"#50E3A4"}}>{fmt(v.netDebtEbitda,'x')}</td>
                      <td style={{textAlign:"right",padding:"7px 10px",color:v.roic>12?"#50E3A4":v.roic>7?"#FB923C":"#FF6B6B"}}>{fmt(v.roic,'%')}</td>
                      <td style={{textAlign:"right",padding:"7px 10px",color:"#8b949e"}}>{fmt(v.beta)}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
            <div style={{marginTop:8,fontSize:10,color:"#6e7681",display:"flex",gap:16}}>
              {[["#50E3A4","较优"],["#FB923C","中等"],["#FF6B6B","偏贵/弱"]].map(([c,l])=>(<span key={l}><span style={{color:c}}>■</span> {l}</span>))}
              <span style={{marginLeft:8}}>E&P均值≈5.8x｜整合大炼溢价9-11x属正常</span>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
            {Object.keys(CO).filter(t=>active.includes(t)).map(t=>{
              const v=valuation[t]; const c=CO[t].color;
              const pColor={"高":"#FF6B6B","中高":"#FB923C","低":"#50E3A4","中":"#8b949e","混乱":"#C084FC"}[v.premium]||"#8b949e";
              return (
                <div key={t} style={{...S.card,borderTop:`2px solid ${c}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                    <span style={{color:c,fontWeight:700,fontSize:13}}>{t}</span>
                    <span style={{fontSize:10,padding:"2px 8px",borderRadius:10,border:`1px solid ${pColor}55`,color:pColor,background:pColor+"22"}}>溢价:{v.premium}</span>
                  </div>
                  <div style={{fontSize:10,color:"#50E3A4",lineHeight:1.6,marginBottom:5}}>✓ {v.reason}</div>
                  <div style={{fontSize:10,color:"#FF6B6B",lineHeight:1.6,borderTop:"1px solid #21262d",paddingTop:5}}>⚠ {v.risk}</div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── AI UPDATE ── */}
      {view==="ai" && (
        <div style={{padding:"0 24px 24px"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 360px",gap:12}}>
            <div style={S.card}>
              <div style={{color:"#C084FC",fontWeight:700,fontSize:12,marginBottom:8}}>⚡ AI 数据更新</div>
              <div style={{fontSize:10,color:"#6e7681",marginBottom:10,lineHeight:1.7}}>
                粘贴财报文字 / earnings call摘要 / 研报摘录 / 混合格式均可。<br/>
                Claude自动提取数字→追加新季度→更新估值→时间轴实时延伸。<br/>
                <span style={{color:"#50E3A4"}}>⚡ 估值倍数（EV/EBITDA等）已由Yahoo Finance自动拉取。</span><br/>
                <span style={{color:"#C084FC"}}>AI更新主要用于新季度业绩数据（产量/FCF/成本）和分析师文字逻辑更新。</span>
              </div>
              <textarea
                value={aiText}
                onChange={e=>setAiText(e.target.value)}
                placeholder={"示例输入：

ExxonMobil Q1 2026: Production 5,150 MBoe/d, Revenue $86B, FCF $7.5B, Capex $6.0B

戴蒙德巴克 Q1'26：日产量920 MBoe/d，桶油成本$4.3，FCF $1.1B

或直接粘贴整段英文财报原文…"}
                style={{width:"100%",boxSizing:"border-box",height:220,resize:"vertical",background:"#010409",color:"#c9d1d9",border:"1px solid #30363d",borderRadius:6,padding:"10px 12px",fontFamily:"inherit",fontSize:11,lineHeight:1.7,outline:"none"}}
              />
              <div style={{display:"flex",gap:8,marginTop:10,alignItems:"center"}}>
                <button
                  onClick={runAiUpdate}
                  disabled={aiStatus==="loading"||!aiText.trim()}
                  style={{padding:"8px 18px",borderRadius:6,fontSize:12,cursor:"pointer",border:"1px solid #C084FC55",background:aiStatus==="loading"?"#C084FC11":"#C084FC33",color:aiStatus==="loading"?"#6e7681":"#C084FC",fontFamily:"inherit",fontWeight:700}}
                >
                  {aiStatus==="loading"?"⏳ 解析中...":"⚡ 提取并更新"}
                </button>
                {aiStatus==="done"&&<span style={{color:"#50E3A4",fontSize:11}}>✓ 已更新，可切换到时间轴查看</span>}
                {aiStatus==="error"&&<span style={{color:"#FF6B6B",fontSize:11}}>✗ 解析失败，检查输入格式</span>}
              </div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <div style={{...S.card,flex:1}}>
                <div style={{color:"#8b949e",fontWeight:700,fontSize:11,marginBottom:8}}>📋 更新记录</div>
                {aiLog.length===0?(
                  <div style={{color:"#6e7681",fontSize:10,lineHeight:1.8}}>暂无记录<br/>粘贴财报后点击"提取并更新"</div>
                ):(
                  aiLog.map((l,i)=>(
                    <div key={i} style={{borderBottom:"1px solid #161b22",paddingBottom:7,marginBottom:7,fontSize:10}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                        <span style={{color:"#50E3A4",fontWeight:700}}>{l.quarter}</span>
                        <span style={{color:"#6e7681"}}>{l.time}</span>
                      </div>
                      <div style={{color:"#c9d1d9",marginBottom:4}}>{l.summary}</div>
                      <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
                        {l.tickers.map(t=>(<span key={t} style={{fontSize:10,padding:"1px 6px",borderRadius:4,border:`1px solid ${CO[t]?.color||"#30363d"}55`,color:CO[t]?.color||"#8b949e",background:(CO[t]?.color||"#8b949e")+"11"}}>{t}</span>))}
                      </div>
                    </div>
                  ))
                )}
              </div>
              <div style={{...S.card,fontSize:10,color:"#6e7681",lineHeight:1.8}}>
                <div style={{color:"#58a6ff",fontWeight:700,marginBottom:5}}>💡 使用说明</div>
                <div>• 可只含1家公司数据，其余保持不变</div>
                <div>• 新季度自动追加到时间轴末端</div>
                <div>• 估值倍数/逻辑文字也会同步更新</div>
                <div>• 支持英文原文 / 中文研报 / 混合</div>
                <div style={{color:"#444d56",marginTop:4}}>单位：产量MBoe/d · Capex $B/Q · FCF $B/Q · 成本$/boe</div>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* FOOTER */}
      <div style={{borderTop:"1px solid #21262d",padding:"9px 24px",display:"flex",justifyContent:"space-between",fontSize:10,color:"#6e7681"}}>
        <span>数据：官方财报 Q4'23–{quarters[lastIdx]} · 估值 stockanalysis/gurufocus · AI更新由Claude Sonnet驱动</span>
        <span>前线简报 · Mar 2026</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
